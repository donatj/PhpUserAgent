on:
  - pull_request
  - push

name: CI

jobs:
  run:
    name: Tests

    strategy:
      matrix:
        operating-system: [ubuntu-latest]
        php-versions: ['5.4', '5.5', '5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']

    runs-on: ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: json

      - name: Install dependencies with composer (legacy PHP)
        if: ${{ matrix.php-versions == '5.4' || matrix.php-versions == '5.5' || matrix.php-versions == '5.6' }}
        env:
          # Intentionally disable Composer's security/audit install blocking for this legacy matrix.
          # Upstream reference: https://getcomposer.org/doc/06-config.md#audit
          COMPOSER_NO_SECURITY_BLOCKING: 1
          # Keep the legacy companion flag as well for compatibility with Composer behavior across versions;
          # see the same Composer audit/security-blocking documentation above.
          COMPOSER_NO_BLOCKING: 1 # Unfortunately every 5.x compatible phpunit is "compromised"
        run: composer install

      - name: Install dependencies with composer
        if: ${{ matrix.php-versions != '5.4' && matrix.php-versions != '5.5' && matrix.php-versions != '5.6' }}
        run: composer install

      - name: Run tests
        run: make test
