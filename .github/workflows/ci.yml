on:
  - pull_request
  - push

name: CI

jobs:
  run:
    name: Tests

    strategy:
      matrix:
        operating-system: [ubuntu-latest]
        php-versions: ['5.4', '5.5', '5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']

    runs-on: ${{ matrix.operating-system }}

    env:
      LEGACY_PHPUNIT: ${{ contains(fromJson('["5.4","5.5","5.6","7.0","7.1"]'), matrix.php-versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: json

      - name: Install dependencies with composer
        env: 
          COMPOSER_NO_SECURITY_BLOCKING: ${{ env.LEGACY_PHPUNIT }}
          COMPOSER_NO_BLOCKING: ${{ env.LEGACY_PHPUNIT }}
        run: composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
